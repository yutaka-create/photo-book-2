<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFF">
    <meta name="description" content="写真集「PHOTO BOOK 2」の紹介ページ。インデックス、写真ギャラリー、著者情報や出版情報などを掲載しています。">
    <meta name="robots" content="noindex, nofollow">
    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PHOTO BOOK 2">
    <meta property="og:description" content="写真集「PHOTO BOOK 2」の紹介ページ。インデックスや写真ギャラリー、出版情報などを掲載しています。">
    <meta property="og:url" content="https://yutaka-create.github.io/photo-book-2/">
    <meta property="og:site_name" content="PHOTO BOOK 2">
    <meta property="og:image" content="https://yutaka-create.github.io/photo-book-2/img/ogp.png">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <title>PHOTO BOOK 2</title>
    <link rel="icon" href="./img/favicon.ico?v=2">
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body id="top">
    <!-- header class="l-header" ここから -->
    <header class="l-header">
        <div class="l-header__container l-container">
            <h1 class="l-header__logo">
                <a class="l-header__link" href="index.html">
                    <img src="./img/logo.svg" alt="PHOTO BOOK2" width="180" height="18">
                </a>
            </h1>
        </div>
    </header>
    <!-- header class="l-header" ここまで -->
    <!-- main class="l-main" ここから -->
    <main class="l-main">
        <!-- div class="p-hero" ここから -->
        <div class="p-hero">
            <div class="p-hero__container l-container">
                <img class="p-hero__image" src="./img/mainvisual.jpg" alt="青空と鮮やかな黄色の建物の外壁" width="1000" height="400">
            </div>
        </div>
        <!-- div class="p-hero" ここまで -->
        <!-- section class="p-index" ここから -->
        <section class="p-index">
            <div class="p-index__container l-container">
                <div class="p-index__inner l-container--inner u-fade-up js-scroll-trigger">
                    <h2 class="p-index__title c-title u-reveal-left js-scroll-trigger">INDEX</h2>
                    <div class="p-index__wrapper u-fade-up js-scroll-trigger">
                        <ol class="p-index__list u-fade-up js-scroll-trigger">
                            <li class="p-index__item u-fade-up js-scroll-trigger">セナ</li>
                            <li class="p-index__item u-fade-up js-scroll-trigger">ウィリアムズルノーFW14B</li>
                            <li class="p-index__item u-fade-up js-scroll-trigger">タイトルタイトルタイトルタイトルタイトルタイトルタイトル</li>
                            <li class="p-index__item u-fade-up js-scroll-trigger">マックスフェルスタッペンレッドブルホンダ</li>
                            <li class="p-index__item u-fade-up js-scroll-trigger">アランプロスト</li>
                        </ol>
                    </div>
                </div>
            </div>
        </section>
        <!-- section class="p-index" ここまで -->
        <!-- div class="p-gallery" ここから -->
        <div class="p-gallery">
            <div class="p-gallery__container l-container">
                <div class="p-gallery__inner l-container--inner">
                    <ul class="p-gallery__list">
                        <li class="p-gallery__item c-card u-fade-up js-scroll-trigger">
                            <article class="p-gallery__article c-card__article">
                                <img src="./img/photo1.jpg" alt="鮮やかな緑色の壁とステンレス製の手すり" width="392" height="261"
                                    loading="lazy">
                            </article>
                        </li>
                        <li class="p-gallery__item c-card u-fade-up js-scroll-trigger">
                            <article class="p-gallery__article c-card__article">
                                <img src="./img/photo2.jpg" alt="青と白に塗り分けられた建物の外壁と、垂直に伸びる白いハシゴ" width="392" height="261"
                                    loading="lazy">
                            </article>
                        </li>
                        <li class="p-gallery__item c-card u-fade-up js-scroll-trigger">
                            <article class="p-gallery__article c-card__article">
                                <img src="./img/photo3.jpg" alt="赤い外壁の建物と外壁に設置された排気ダクト" width="392" height="261"
                                    loading="lazy">
                            </article>
                        </li>
                        <li class="p-gallery__item c-card u-fade-up js-scroll-trigger">
                            <article class="p-gallery__article c-card__article">
                                <img src="./img/photo4.jpg" alt="上下で白と黒に塗り分けられた壁と、白い壁に取り付けられた小さな監視カメラ" width="392"
                                    height="261" loading="lazy">
                            </article>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- div class="p-gallery" ここまで -->
        <!-- section class="p-detail" ここから -->
        <section class="p-detail">
            <div class="p-detail__container l-container">
                <div class="p-detail__inner l-container--inner u-fade-up js-scroll-trigger">
                    <h2 class="p-detail__title c-title u-reveal-left js-scroll-trigger">DETAIL</h2>
                    <div class="p-detail__content">
                        <dl class="p-detail__meta u-fade-up js-scroll-trigger">
                            <div class="p-detail__meta-item">
                                <dt class="p-detail__meta-term">著者</dt>
                                <dd class="p-detail__meta-description">タイトルタイトルタイトル</dd>
                            </div>
                            <div class="p-detail__meta-item">
                                <dt class="p-detail__meta-term">出版社</dt>
                                <dd class="p-detail__meta-description">タイトルタイトルタイトル</dd>
                            </div>
                            <div class="p-detail__meta-item">
                                <dt class="p-detail__meta-term">発行年</dt>
                                <dd class="p-detail__meta-description"><time datetime="2021-01-01">2021年1月1日</time></dd>
                            </div>
                        </dl>
                        <div class="p-detail__body u-fade-up js-scroll-trigger">
                            <p class="p-detail__text">テキストテキストテキストテキストテキストテキストテキストテキストテキスト</p>
                            <p class="p-detail__text">テキストテキストテキストテキストテキストテキストテキストテキストテキスト</p>
                            <a class="p-detail__link c-btn" href="#">オンラインストアで見る</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- section class="p-detail" ここまで -->
    </main>
    <!-- main class="l-main" ここまで -->
    <!-- footer class="l-footer" ここから -->
    <footer class="l-footer">
        <small class="l-footer__copyright">&copy; 2021 PHOTO BOOK 2</small>
    </footer>
    <!-- footer class="l-footer" ここまで -->

    <!-- ページトップ戻るボタン ここから  -->
    <a class="c-page-top js-pagetop" href="#top" aria-label="ページトップへ戻る"></a>
    <!-- ページトップ戻るボタン ここまで  -->

    <script src="./js/intersection.js"></script>
    <script src="./js/pagetop.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
